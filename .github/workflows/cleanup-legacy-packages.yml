name: Cleanup Legacy Packages

on:
  workflow_dispatch:

permissions:
  packages: write
  contents: read

jobs:
  delete-legacy-images:
    runs-on: ubuntu-latest
    steps:
      - name: Delete food-order/backend and food-order/frontend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          for pkg in "food-order/backend" "food-order/frontend"; do
            encoded=$(printf '%s' "$pkg" | jq -sRr @uri)
            echo "Deleting package: $pkg"
            if gh api -X DELETE "users/${OWNER}/packages/container/${encoded}"; then
              echo "Deleted: $pkg"
            else
              echo "Package not found or already deleted: $pkg" >&2
            fi
          done
